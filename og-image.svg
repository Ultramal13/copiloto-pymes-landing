<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="55%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050B18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#00D68F" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#050B18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="55%" stop-color="#00D68F"/>
      <stop offset="100%" stop-color="#00B8FF"/>
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D68F"/>
      <stop offset="100%" stop-color="#00B87A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050B18"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="80"  cy="80"  r="2"/><circle cx="160" cy="80"  r="2"/><circle cx="240" cy="80"  r="2"/>
    <circle cx="320" cy="80"  r="2"/><circle cx="400" cy="80"  r="2"/><circle cx="480" cy="80"  r="2"/>
    <circle cx="560" cy="80"  r="2"/><circle cx="640" cy="80"  r="2"/><circle cx="720" cy="80"  r="2"/>
    <circle cx="800" cy="80"  r="2"/><circle cx="880" cy="80"  r="2"/><circle cx="960" cy="80"  r="2"/>
    <circle cx="1040" cy="80" r="2"/><circle cx="1120" cy="80" r="2"/>
    <circle cx="80"  cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/>
    <circle cx="320" cy="160" r="2"/><circle cx="400" cy="160" r="2"/><circle cx="480" cy="160" r="2"/>
    <circle cx="560" cy="160" r="2"/><circle cx="640" cy="160" r="2"/><circle cx="720" cy="160" r="2"/>
    <circle cx="800" cy="160" r="2"/><circle cx="880" cy="160" r="2"/><circle cx="960" cy="160" r="2"/>
    <circle cx="1040" cy="160" r="2"/><circle cx="1120" cy="160" r="2"/>
    <circle cx="80"  cy="550" r="2"/><circle cx="160" cy="550" r="2"/><circle cx="240" cy="550" r="2"/>
    <circle cx="320" cy="550" r="2"/><circle cx="400" cy="550" r="2"/><circle cx="480" cy="550" r="2"/>
    <circle cx="560" cy="550" r="2"/><circle cx="640" cy="550" r="2"/>
  </g>

  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="120" r="200" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="120" r="280" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.08"/>

  <!-- Logo icon -->
  <rect x="72" y="200" width="64" height="64" rx="16" fill="url(#badge-grad)"/>
  <g transform="translate(84, 212)" stroke="#050B18" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M20 2L2 11l18 9 18-9-18-9z"/>
    <path d="M2 29l18 9 18-9"/>
    <path d="M2 20l18 9 18-9"/>
  </g>

  <!-- Brand name -->
  <text x="152" y="228" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#00D68F" letter-spacing="0.5">COPILOTO DE PYMES</text>
  <text x="152" y="252" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748B">copiloto-pymes-landing.vercel.app</text>

  <!-- Main title -->
  <text x="72" y="345" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800" fill="url(#title-grad)">El copiloto inteligente</text>
  <text x="72" y="425" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800" fill="url(#title-grad)">que protege tu empresa</text>

  <!-- Description -->
  <text x="72" y="480" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400" fill="#94A3B8">IA predictiva • Alertas tributarias del SII • Monitor laboral</text>

  <!-- Feature pills -->
  <rect x="72"  y="515" width="210" height="40" rx="20" fill="rgba(0,214,143,0.12)" stroke="#00D68F" stroke-width="1" stroke-opacity="0.4"/>
  <text x="177" y="541" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#00D68F" text-anchor="middle">Acceso Anticipado</text>

  <rect x="296" y="515" width="190" height="40" rx="20" fill="rgba(99,102,241,0.12)" stroke="#6366F1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="391" y="541" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#818CF8" text-anchor="middle">Precio de Fundador</text>

  <rect x="500" y="515" width="160" height="40" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="580" y="541" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#94A3B8" text-anchor="middle">Hecho en Chile</text>
</svg>
